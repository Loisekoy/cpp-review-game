<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2f5bea" />
    <meta
      name="description"
      content="給國中生複習 Scratch 與 C++ 基礎語法的互動小遊戲"
    />
    <title>程式能量接力｜Scratch × C++ 小遊戲</title>
    <link rel="icon" href="../assets/sprite.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <span>Scratch × C++ 小遊戲</span>
          <h1>程式能量接力</h1>
        </div>

        <div class="top-actions">
          <a class="nav-button" href="../">回總複習</a>
          <button class="ghost-button" id="resetButton" type="button">重新開始</button>
        </div>
      </header>

      <section class="scoreboard" aria-label="遊戲狀態">
        <div>
          <span>題目</span>
          <strong id="roundCounter">1 / 8</strong>
        </div>
        <div>
          <span>分數</span>
          <strong id="scoreValue">0</strong>
        </div>
        <div>
          <span>連答</span>
          <strong id="streakValue">0</strong>
        </div>
        <div>
          <span>最佳</span>
          <strong id="bestValue">0</strong>
        </div>
      </section>

      <section class="play-layout" aria-live="polite">
        <section class="track-panel" aria-label="能量接力跑道">
          <div class="track-header">
            <div>
              <span class="small-label">Energy Relay</span>
              <h2>答對一題，角色前進一格</h2>
            </div>
            <div class="energy-meter" id="energyMeter" aria-label="能量格"></div>
          </div>

          <div class="track" id="track">
            <ol class="checkpoints" id="checkpoints"></ol>
            <img
              class="runner"
              id="runner"
              src="../assets/sprite.svg"
              alt="正在接力的程式角色"
            />
          </div>

          <div class="feedback" id="feedback" data-tone="neutral">
            <span aria-hidden="true">●</span>
            <p id="feedbackText">選一個正確指令，幫角色充能前進。</p>
          </div>
        </section>

        <section class="challenge-panel" aria-labelledby="challengeTitle">
          <span class="small-label" id="conceptLabel">Scratch</span>
          <h2 id="challengeTitle">準備題目中</h2>
          <p id="challengePrompt"></p>

          <div class="prompt-window" id="promptWindow"></div>

          <div class="answers" id="answers"></div>

          <div class="challenge-actions">
            <button class="primary-button" id="nextButton" type="button" hidden>下一題</button>
          </div>
        </section>
      </section>
    </main>

    <dialog class="result-dialog" id="resultDialog">
      <div class="result-badge" id="resultBadge">A</div>
      <p class="result-kicker">接力完成</p>
      <h2 id="resultTitle">程式能量隊長</h2>
      <p class="result-score">總分 <strong id="finalScore">100</strong> / 100</p>
      <p id="resultMessage"></p>
      <ol class="review-list" id="reviewList"></ol>
      <div class="result-actions">
        <button class="primary-button" id="playAgainButton" type="button">再玩一次</button>
        <a class="nav-button" href="../">回總複習</a>
      </div>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
